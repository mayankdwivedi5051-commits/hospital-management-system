<!DOCTYPE html>
<html>
<head>
<title>Register Patient</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#2b5876,#4e4376);
font-family: Arial;
}

.box{
background: rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
color:white;
width:320px;
backdrop-filter: blur(10px);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

h2{text-align:center;}

.success{
text-align:center;
color:#00ffcc;
margin-bottom:10px;
}

label{
font-size:13px;
margin-top:5px;
display:block;
}

input, select, button{
width:100%;
margin:5px 0 10px 0;
padding:10px;
border:none;
border-radius:8px;
}

button{
background:#00c6ff;
color:white;
}
</style>
</head>

<body>

<div class="box">

<h2>Add Patient</h2>

{% if msg %}
<div class="success">{{ msg }}</div>
{% endif %}

<form method="POST">

<label>Patient Name</label>
<input name="name" placeholder="Enter full name" required>

<label>Age</label>
<input name="age" placeholder="Enter age" required>

<label>Gender</label>
<select name="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Phone Number</label>
<input name="phone" placeholder="Enter phone number" required>

<label>Disease / Problem</label>
<input name="disease" placeholder="Enter disease" required>

<label>Room Number</label>
<input name="room" placeholder="Example: 101">

<label>Payment Amount (₹)</label>
<input name="payment" placeholder="Example: 5000">

<label>Admit Date</label>
<input type="date" name="admit_date">

<label>Discharge Date</label>
<input type="date" name="discharge_date">

<button>Register</button>

</form>

</div>

</body>
</html>
