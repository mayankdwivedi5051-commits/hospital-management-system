<!DOCTYPE html>
<html>
<head>
    <title>Hospital Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(270deg, #667eea, #764ba2, #6dd5ed);
            background-size: 600% 600%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% }
            50% { background-position: 100% }
            100% { background-position: 0% }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            color: white;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            text-align: center;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 25px;
        }

        .input-box {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        .toggle {
            position: relative;
        }

        .toggle span {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            color: black;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.8;
        }

    </style>
</head>

<body>

<div class="login-box">
    <div class="logo">🏥</div>
    <h2>Hospital Admin</h2>

    <form method="POST">

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box toggle">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span onclick="togglePassword()">👁</span>
        </div>

        <button class="btn">Login</button>

    </form>

    <div class="footer">
        © 2026 Hospital System
    </div>
</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
