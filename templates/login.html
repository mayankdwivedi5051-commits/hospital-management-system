<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<!-- ✅ RESPONSIVE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(-45deg,#1e3c72,#2a5298,#4facfe,#00f2fe);
background-size:400% 400%;
animation:gradient 10s ease infinite;
font-family: Arial;
}

/* ANIMATION */
@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* 🔥 MAIN BOX FIX */
.box{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:15px;
color:white;
text-align:center;

width:90%;          /* ✅ responsive */
max-width:350px;    /* ✅ limit */

backdrop-filter: blur(10px);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* INPUT + BUTTON */
input,button{
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

/* INPUT STYLE */
input{
background:rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#ddd;
}

/* BUTTON */
button{
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="box">

<h2>Hospital Login</h2>

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

</div>

</body>
</html>
