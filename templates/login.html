<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
margin:0;height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(-45deg,#667eea,#764ba2,#6a11cb,#2575fc);
background-size:400% 400%;animation:gradient 8s infinite;
}
@keyframes gradient{
0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}
}
.box{background:rgba(255,255,255,0.1);padding:40px;border-radius:15px;color:white;}
input,button{width:100%;margin:10px 0;padding:10px;border:none;border-radius:8px;}
button{background:#00c6ff;color:white;}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>
</div>
</body>
</html>
