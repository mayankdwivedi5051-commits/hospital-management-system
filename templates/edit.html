<!DOCTYPE html>
<html>
<head>
<title>Edit Patient</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#1e3c72,#2a5298);
font-family: Arial;
}

.card{
background: rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
color:white;
width:350px;
backdrop-filter: blur(12px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input, select, button{
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:8px;
}

button{
background:#00c6ff;
color:white;
}

.back{
display:block;
margin-top:10px;
text-align:center;
padding:10px;
background:#636e72;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="card">

<h2>Edit Patient</h2>

<form method="POST">

<input name="name" value="{{ patient.name }}">
<input name="age" value="{{ patient.age }}">

<select name="gender">
<option value="Male" {% if patient.gender=="Male" %}selected{% endif %}>Male</option>
<option value="Female" {% if patient.gender=="Female" %}selected{% endif %}>Female</option>
</select>

<input name="phone" value="{{ patient.phone }}">
<input name="disease" value="{{ patient.disease }}">

<!-- 🔥 NEW FIELDS -->
<input name="room" value="{{ patient.room }}">
<input name="payment" value="{{ patient.payment }}">
<input type="date" name="payment_date" value="{{ patient.payment_date }}">
<input type="date" name="admit_date" value="{{ patient.admit_date }}">
<input type="date" name="discharge_date" value="{{ patient.discharge_date }}">

<button>Update</button>

</form>

<a href="/dashboard" class="back">Back</a>

</div>

</body>
</html>
