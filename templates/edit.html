<!DOCTYPE html>
<html>
<head>
<title>Edit Patient</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#1e3c72,#2a5298);
font-family: 'Segoe UI', Arial;
}

/* BOX */
.card{
background: rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
color:white;
width:350px;
backdrop-filter: blur(12px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:15px;
}

/* INPUTS */
input, select, button{
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:8px;
}

input, select{
background:rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#ddd;
}

/* BUTTON */
button{
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* BACK BUTTON */
.back{
display:block;
margin-top:10px;
text-align:center;
padding:10px;
background:#636e72;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>

</head>

<body>

<div class="card">

<h2>Edit Patient</h2>

<form method="POST">

<input type="text" name="name" value="{{ patient.name }}" required>

<input type="text" name="age" value="{{ patient.age }}" required>

<select name="gender" required>
<option value="Male" {% if patient.gender=="Male" %}selected{% endif %}>Male</option>
<option value="Female" {% if patient.gender=="Female" %}selected{% endif %}>Female</option>
</select>

<input type="text" name="phone" value="{{ patient.phone }}" required>

<input type="text" name="disease" value="{{ patient.disease }}" required>

<button type="submit">Update</button>

</form>

<a href="/dashboard" class="back">⬅ Back</a>

</div>

</body>
</html>
