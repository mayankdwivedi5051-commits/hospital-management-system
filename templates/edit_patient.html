<!DOCTYPE html>
<html>
<head>
<title>Edit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Edit Patient</h2>

<form method="POST" action="/update/{{patient[0]}}" class="card p-4 shadow">

<input class="form-control mb-3" name="name" value="{{patient[1]}}">
<input class="form-control mb-3" name="age" value="{{patient[2]}}">
<input class="form-control mb-3" name="gender" value="{{patient[3]}}">
<input class="form-control mb-3" name="phone" value="{{patient[4]}}">
<input class="form-control mb-3" name="disease" value="{{patient[5]}}">

<button class="btn btn-primary">Update</button>

</form>

</div>

</body>
</html>
