<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: rgba(0,0,0,0.4);
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            margin: 10px 0;
            text-decoration: none;
        }

        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .card-box {
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            color: white;
        }

        .blue { background: #2196f3; }
        .green { background: #4caf50; }
        .orange { background: #ff9800; }

        table {
            background: white;
            color: black;
        }

        .graph-box {
            max-width: 500px;
            margin: auto;
            height: 300px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>🏥 HMS</h3>
    <a href="/dashboard">Dashboard</a>
    <a href="/register">Add Patient</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

    <h2>Dashboard</h2>

    <!-- STATS -->
    <div class="row">
        <div class="col-md-4">
            <div class="card-box blue">
                <h5>Total</h5>
                <h3>{{ total }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box green">
                <h5>Male</h5>
                <h3>{{ male }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box orange">
                <h5>Female</h5>
                <h3>{{ female }}</h3>
            </div>
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="mt-3 mb-3">
        <a href="/register" class="btn btn-primary">Add Patient</a>
    </div>

    <!-- SEARCH -->
    <input type="text" id="search" class="form-control mb-3" placeholder="Search patient...">

    <!-- TABLE -->
    <table class="table table-bordered" id="patientTable">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Phone</th>
            <th>Disease</th>
            <th>Action</th>
        </tr>

        {% for p in patients %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.name }}</td>
            <td>{{ p.age }}</td>
            <td>{{ p.gender }}</td>
            <td>{{ p.phone }}</td>
            <td>{{ p.disease }}</td>
            <td>
                <a href="/view/{{ p.id }}" class="btn btn-info btn-sm">View</a>
                <a href="/edit/{{ p.id }}" class="btn btn-success btn-sm">Edit</a>
                <a href="/delete/{{ p.id }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <!-- GRAPH -->
    <div class="card-box mt-4 graph-box text-dark">
        <canvas id="myChart"></canvas>
    </div>

</div>

<script>
// SEARCH
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("#patientTable tr");

    rows.forEach((row, index) => {
        if(index === 0) return;
        row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});

// GRAPH
var ctx = document.getElementById('myChart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Total', 'Male', 'Female'],
        datasets: [{
            data: [{{ total }}, {{ male }}, {{ female }}],
            backgroundColor: ['#2196f3', '#4caf50', '#ff9800']
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

</body>
</html>
