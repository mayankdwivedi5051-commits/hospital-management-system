<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f7fa; padding: 20px; }

.card-box {
    color: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.blue { background: linear-gradient(45deg,#2196F3,#21CBF3); }
.green { background: linear-gradient(45deg,#00c853,#64dd17); }
.orange { background: linear-gradient(45deg,#ff9800,#ffb74d); }

.chart-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2 class="text-center mb-4">Dashboard</h2>

<!-- 🔥 CARDS -->
<div class="row mb-3">
<div class="col-md-4">
<div class="card-box blue">
<h5>Total Patients</h5>
<h2>{{ total }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card-box green">
<h5>Male Patients</h5>
<h2>{{ male }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card-box orange">
<h5>Female Patients</h5>
<h2>{{ female }}</h2>
</div>
</div>
</div>

<!-- 🔥 BUTTONS -->
<div class="mb-3">
<a href="/register" class="btn btn-primary">Add Patient</a>
<a href="/logout" class="btn btn-danger">Logout</a>
</div>

<!-- 🔥 TABLE -->
<table class="table table-bordered table-hover bg-white">
<tr>
<th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Disease</th><th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ p.name }}</td>
<td>{{ p.age }}</td>
<td>{{ p.gender }}</td>
<td>{{ p.phone }}</td>
<td>{{ p.disease }}</td>
<td>
<a href="/view/{{ p.id }}" class="btn btn-info btn-sm">View</a>
<a href="/edit/{{ p.id }}" class="btn btn-success btn-sm">Edit</a>
<a href="/delete/{{ p.id }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

<!-- 🔥 GRAPH -->
<div class="chart-box">
<canvas id="myChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
var ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Male', 'Female'],
        datasets: [{
            data: [{{ male }}, {{ female }}]
        }]
    }
});
</script>

</body>
</html>
