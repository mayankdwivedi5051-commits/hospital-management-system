<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg,#2b5876,#4e4376);
    padding: 20px;
}

/* TITLE */
h2 {
    text-align: center;
    color: white;
    margin-bottom: 25px;
}

/* CONTAINER */
.container {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(12px);
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    padding: 22px;
    border-radius: 12px;
    text-align: center;
    color: white;
    font-weight: 600;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
}

/* SAME COLORS */
.total { background:#ff7675; }
.male { background:#00b894; }
.female { background:#0984e3; }

/* BUTTONS */
.top-btns {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.btn {
    padding: 8px 16px;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.3s;
}

.add { background: #6c5ce7; }
.logout { background: #d63031; }

.btn:hover {
    opacity: 0.8;
}

/* TABLE */
.table-box {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #2d3436;
    color: white;
}

tr:nth-child(even) {
    background: #f5f6fa;
}

/* ACTION BUTTONS */
.view {
    background:#00cec9;
    padding:5px 10px;
    border-radius:5px;
    color:white;
    text-decoration:none;
}

.edit {
    background:#2ecc71;
    padding:5px 10px;
    border-radius:5px;
    color:white;
    text-decoration:none;
}

.delete {
    background:#e74c3c;
    padding:5px 10px;
    border-radius:5px;
    color:white;
    text-decoration:none;
}

/* GRAPH */
.chart-box {
    margin-top: 25px;
    background: white;
    padding: 15px;
    border-radius: 12px;
    width: 300px;
    margin-left: auto;
    margin-right: auto;
}
</style>

</head>

<body>

<h2>Patient Dashboard</h2>

<div class="container">

<div class="cards">
<div class="card total">
Total<br><h2>{{ total }}</h2>
</div>

<div class="card male">
Male<br><h2>{{ male }}</h2>
</div>

<div class="card female">
Female<br><h2>{{ female }}</h2>
</div>
</div>

<div class="top-btns">
<a href="/register" class="btn add">Add Patient</a>
<a href="/logout" class="btn logout">Logout</a>
</div>

<div class="table-box">
<table>
<tr>
<th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Disease</th><th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ p.name }}</td>
<td>{{ p.age }}</td>
<td>{{ p.gender }}</td>
<td>{{ p.phone }}</td>
<td>{{ p.disease }}</td>
<td>
<a href="/view/{{ p.id }}" class="view">View</a>
<a href="/edit/{{ p.id }}" class="edit">Edit</a>
<a href="/delete/{{ p.id }}" class="delete">Delete</a>
</td>
</tr>
{% endfor %}

</table>
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
        labels: ['Male', 'Female'],
        datasets: [{
            data: [{{ male }}, {{ female }}],
            backgroundColor: ['#00b894', '#0984e3']
        }]
    }
});
</script>

</body>
</html>
