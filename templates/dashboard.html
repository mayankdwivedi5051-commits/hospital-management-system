<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    padding: 20px;
}

/* TITLE */
h2 {
    text-align: center;
    color: white;
    margin-bottom: 25px;
}

/* MAIN CONTAINER */
.container {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.total { background:#6c5ce7; }
.male { background:#00b894; }
.female { background:#0984e3; }

/* BUTTONS */
.top-btns {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 15px;
}

.btn {
    padding: 8px 16px;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
}

.add { background: #0984e3; }
.logout { background: #d63031; }

/* TABLE */
.table-box {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #2c3e50;
    color: white;
}

tr:nth-child(even) {
    background: #f8f9fa;
}

/* ACTION BUTTONS */
.view { background:#3498db; padding:5px 10px; border-radius:4px; color:white; }
.edit { background:#27ae60; padding:5px 10px; border-radius:4px; color:white; }
.delete { background:#e74c3c; padding:5px 10px; border-radius:4px; color:white; }

/* GRAPH */
.chart-box {
    margin-top: 25px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 300px;
    margin-left: auto;
    margin-right: auto;
}
</style>

</head>

<body>

<h2>Patient Dashboard</h2>

<div class="container">

<div class="cards">
<div class="card total">
Total<br><h2>{{ total }}</h2>
</div>

<div class="card male">
Male<br><h2>{{ male }}</h2>
</div>

<div class="card female">
Female<br><h2>{{ female }}</h2>
</div>
</div>

<div class="top-btns">
<a href="/register" class="btn add">Add Patient</a>
<a href="/logout" class="btn logout">Logout</a>
</div>

<div class="table-box">
<table>
<tr>
<th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Disease</th><th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ p.name }}</td>
<td>{{ p.age }}</td>
<td>{{ p.gender }}</td>
<td>{{ p.phone }}</td>
<td>{{ p.disease }}</td>
<td>
<a href="/view/{{ p.id }}" class="view">View</a>
<a href="/edit/{{ p.id }}" class="edit">Edit</a>
<a href="/delete/{{ p.id }}" class="delete">Delete</a>
</td>
</tr>
{% endfor %}

</table>
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
        labels: ['Male', 'Female'],
        datasets: [{
            data: [{{ male }}, {{ female }}],
            backgroundColor: ['#00b894', '#0984e3']
        }]
    }
});
</script>

</body>
</html>
