<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    padding: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.2);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* BUTTONS */
.top-btns {
    margin-bottom: 15px;
}

.btn {
    padding: 8px 15px;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-right: 5px;
}

.add { background: #00c6ff; }
.logout { background: #ff4b2b; }

.view { background: #17a2b8; }
.edit { background: #28a745; }
.delete { background: #dc3545; }

/* TABLE */
.table-box {
    background: white;
    color: black;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #333;
    color: white;
}

tr:nth-child(even) {
    background: #f2f2f2;
}

/* GRAPH */
.chart-box {
    margin-top: 25px;
    background: white;
    padding: 20px;
    border-radius: 15px;
}
</style>

</head>

<body>

<h2>Patient Dashboard</h2>

<!-- CARDS -->
<div class="cards">
<div class="card">
<h3>Total</h3>
<h2>{{ total }}</h2>
</div>

<div class="card">
<h3>Male</h3>
<h2>{{ male }}</h2>
</div>

<div class="card">
<h3>Female</h3>
<h2>{{ female }}</h2>
</div>
</div>

<!-- BUTTONS -->
<div class="top-btns">
<a href="/register" class="btn add">Add Patient</a>
<a href="/logout" class="btn logout">Logout</a>
</div>

<!-- TABLE -->
<div class="table-box">
<table>
<tr>
<th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Disease</th><th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ p.name }}</td>
<td>{{ p.age }}</td>
<td>{{ p.gender }}</td>
<td>{{ p.phone }}</td>
<td>{{ p.disease }}</td>
<td>
<a href="/view/{{ p.id }}" class="btn view">View</a>
<a href="/edit/{{ p.id }}" class="btn edit">Edit</a>
<a href="/delete/{{ p.id }}" class="btn delete">Delete</a>
</td>
</tr>
{% endfor %}

</table>
</div>

<!-- GRAPH -->
<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
        labels: ['Male', 'Female'],
        datasets: [{
            data: [{{ male }}, {{ female }}]
        }]
    }
});
</script>

</body>
</html>
